spring:
  application:
    name: tripplanner
  
  # 💾 H2 Database Configuration (For Development)
  datasource:
    url: jdbc:h2:mem:tripplanner_db
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true

server:
  port: 8081

9router:
  api:
    key: ${9ROUTER_API_KEY:sk-c2147761fa597b56-nkczpl-cb52299c}
