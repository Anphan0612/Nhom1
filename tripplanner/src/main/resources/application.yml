spring:
  application:
    name: tripplanner

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR

server:
  port: ${PORT:8090}

router9:
  api:
    key: ${ROUTER9_API_KEY:}
    url: ${ROUTER9_API_URL:http://localhost:20128/v1/chat/completions}

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000/ai}