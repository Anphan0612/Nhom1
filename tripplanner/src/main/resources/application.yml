spring:
  application:
    name: tripplanner
  
  # 💾 H2 Database Configuration (For Development)
  datasource:
    url: jdbc:h2:mem:tripplanner_db
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8081

router9:
  api:
    key: ${9ROUTER_API_KEY:}
    url: http://localhost:20128/v1/chat/completions


