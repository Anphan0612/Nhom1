# ==========================================================
# 🚀 AI Trip Planner - CI/CD Pipeline
# ==========================================================
# Triggers on push/PR to main/develop branches
# Jobs: Lint → Build → Test → Docker Build → Deploy
# ==========================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/tripplanner

jobs:
  # ─────────────────────────────────────────
  # 🔍 Stage 1: Frontend Lint & Build
  # ─────────────────────────────────────────
  frontend-build:
    name: "⚛️ Frontend Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./FluidConcierge

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: FluidConcierge/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint check
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ TypeScript & Vite build
        run: npm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: FluidConcierge/dist
          retention-days: 7

  # ─────────────────────────────────────────
  # ☕ Stage 2: Backend Build & Test
  # ─────────────────────────────────────────
  backend-build:
    name: "☕ Backend Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tripplanner

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: 🧪 Run tests
        run: ./mvnw test -B

      - name: 📤 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: tripplanner/target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────
  # 🐍 Stage 3: AI Service Lint & Test
  # ─────────────────────────────────────────
  ai-service-build:
    name: "🐍 AI Service Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai_service

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai_service/requirements.txt

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🧪 Run tests
        run: pytest tests/ -v
        continue-on-error: true

  # ─────────────────────────────────────────
  # 🐳 Stage 4: Docker Build & Push
  # ─────────────────────────────────────────
  docker-build:
    name: "🐳 Docker Build & Push"
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, ai-service-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate Docker metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: 🏗️ Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./tripplanner
          file: ./tripplanner/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏷️ Generate Docker metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: 🏗️ Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./FluidConcierge
          file: ./FluidConcierge/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏷️ Generate Docker metadata (AI Service)
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-service
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: 🏗️ Build & Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai_service
          file: ./ai_service/Dockerfile
          push: true
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 🚢 Stage 5: Deploy (Docker Compose)
  # ─────────────────────────────────────────
  deploy:
    name: "🚢 Deploy to Server"
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        if: ${{ vars.DEPLOY_HOST != '' }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH || '/opt/tripplanner' }}
            git pull origin main
            
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images and restart
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Cleanup old images
            docker image prune -f
            
            echo "✅ Deployment complete!"
